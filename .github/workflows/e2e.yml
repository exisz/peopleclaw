name: E2E (Playwright)

on:
  schedule:
    - cron: '0 22 * * *'  # daily 22:00 UTC (08:00 Sydney)
  workflow_dispatch:

# Only allow one e2e run at a time, cancel in-progress on new push
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BASE_URL: https://app.peopleclaw.rollersoft.com.au
      E2E_USERNAME: demo_acceptance_test
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_USE_MINT: '1'
      E2E_SECRET: ${{ secrets.E2E_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @peopleclaw/admin exec playwright install --with-deps chromium

      - name: Wait for Vercel deploy (SHA gate)
        # Hard gate: prod /api/health must report build.sha == github.sha (or send matching x-build-sha header).
        # Polls up to 10 minutes (60 × 10s). FAILS the workflow on timeout — no "running tests anyway".
        run: |
          set -u
          EXPECTED_SHA="${{ github.sha }}"
          echo "Waiting for prod $PLAYWRIGHT_BASE_URL/api/health to report build.sha=$EXPECTED_SHA ..."
          for i in $(seq 1 60); do
            # Capture body + header in one shot.
            HDR_FILE=$(mktemp)
            BODY=$(curl -s -D "$HDR_FILE" --max-time 8 "$PLAYWRIGHT_BASE_URL/api/health" || true)
            HDR_SHA=$(awk -F': *' 'tolower($1)=="x-build-sha"{gsub(/\r/,"",$2); print $2}' "$HDR_FILE" | head -1)
            BODY_SHA=$(printf '%s' "$BODY" | jq -r '.build.sha // empty' 2>/dev/null || true)
            rm -f "$HDR_FILE"
            if [ "$BODY_SHA" = "$EXPECTED_SHA" ] || [ "$HDR_SHA" = "$EXPECTED_SHA" ]; then
              echo "✅ Prod is on $EXPECTED_SHA after $((i*10))s (body=$BODY_SHA header=$HDR_SHA)"
              exit 0
            fi
            echo "  attempt $i/60 — prod sha body=${BODY_SHA:-?} header=${HDR_SHA:-?} (want $EXPECTED_SHA)"
            sleep 10
          done
          echo "::error::Timeout waiting for prod to deploy $EXPECTED_SHA — failing the gate. NOT running tests against stale prod."
          exit 1

      - name: Run e2e tests
        id: tests
        run: pnpm --filter @peopleclaw/admin exec playwright test --reporter=github,html,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: apps/admin/test-results/results.json

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/admin/playwright-report/
            apps/admin/test-results/
          retention-days: 30

      - name: Embed failed screenshots in Job Summary
        if: failure()
        run: |
          RESULTS="apps/admin/test-results/results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "No results.json found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## ❌ Failed E2E Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Extract failed test names and find their screenshots
          jq -r '.suites[].suites[]?.specs[]? | select(.ok == false) | .title' "$RESULTS" 2>/dev/null | while read -r title; do
            echo "### $title" >> "$GITHUB_STEP_SUMMARY"
            # Find the last screenshot for this test in test-results
            SCREENSHOT=$(find apps/admin/test-results -name "*.png" -path "*$(echo "$title" | tr ' ' '-' | head -c 50)*" | sort | tail -1)
            if [ -z "$SCREENSHOT" ]; then
              # Fallback: grab any recent screenshot
              SCREENSHOT=$(find apps/admin/test-results -name "*.png" | sort | tail -1)
            fi
            if [ -n "$SCREENSHOT" ] && [ -f "$SCREENSHOT" ]; then
              B64=$(base64 -w0 "$SCREENSHOT" 2>/dev/null || base64 "$SCREENSHOT")
              echo "![failure](data:image/png;base64,$B64)" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Prepare report for Pages
        if: always()
        run: |
          mkdir -p public
          REPORT_DIR="apps/admin/playwright-report"
          if [ -f "$REPORT_DIR/index.html" ]; then
            echo "✅ Playwright report found"
            cp -r "$REPORT_DIR"/* public/
          else
            echo "⚠️ No playwright report generated — creating placeholder"
            echo '<!DOCTYPE html><html><body><h1>No Playwright report</h1><p>Check <a href="https://github.com/exisz/peopleclaw/actions">Actions</a>.</p></body></html>' > public/index.html
          fi

          # Copy test-results (traces, videos, screenshots) into public/
          TEST_RESULTS="apps/admin/test-results"
          if [ -d "$TEST_RESULTS" ]; then
            cp -r "$TEST_RESULTS" public/test-results
            echo "✅ test-results copied to public/"
          fi

          # Add trends link to index.html
          if [ -f public/index.html ]; then
            sed -i 's|</body>|<div style="position:fixed;top:10px;right:10px;z-index:9999"><a href="trends.html" style="padding:8px 16px;background:#4CAF50;color:white;text-decoration:none;border-radius:4px;font-weight:bold">📈 Trends</a></div></body>|' public/index.html
          fi

          ls public/index.html || (echo "❌ FATAL: no index.html" && exit 1)

      - name: Append to results.csv (trends data)
        if: always()
        run: |
          RESULTS="apps/admin/test-results/results.json"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHA="${{ github.sha }}"
          if [ -f "$RESULTS" ]; then
            DURATION=$(jq '.stats.duration // 0' "$RESULTS")
            TOTAL=$(jq '.stats.expected // 0' "$RESULTS")
            PASSED=$(jq '.stats.expected // 0' "$RESULTS")
            FAILED=$(jq '.stats.unexpected // 0' "$RESULTS")
            TOTAL=$((PASSED + FAILED))
          else
            DURATION=0; TOTAL=0; PASSED=0; FAILED=0
          fi
          # Fetch existing CSV from gh-pages
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git show origin/gh-pages:results.csv > public/results.csv 2>/dev/null || echo "timestamp,sha,duration,total,passed,failed" > public/results.csv
          echo "$TIMESTAMP,$SHA,$DURATION,$TOTAL,$PASSED,$FAILED" >> public/results.csv

      - name: Generate trends.html
        if: always()
        run: |
          cat > public/trends.html << 'TRENDSEOF'
          <!DOCTYPE html>
          <html><head>
          <title>E2E Trends — PeopleClaw</title>
          <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          <style>body{font-family:system-ui;max-width:1200px;margin:0 auto;padding:20px}canvas{max-height:400px}.back{margin-bottom:20px;display:inline-block}</style>
          </head><body>
          <a class="back" href="index.html">← Back to Report</a>
          <h1>📈 E2E Trends</h1>
          <h2>Pass Rate</h2><canvas id="passRate"></canvas>
          <h2>Duration (ms)</h2><canvas id="duration"></canvas>
          <script>
          fetch('results.csv').then(r=>r.text()).then(csv=>{
            const rows=csv.trim().split('\n').slice(1).map(r=>{const c=r.split(',');return{ts:c[0],sha:c[1],duration:+c[2],total:+c[3],passed:+c[4],failed:+c[5]}});
            const last30=rows.slice(-30);
            const labels=last30.map(r=>r.ts.slice(5,10));
            const passRates=last30.map(r=>r.total?Math.round(r.passed/r.total*100):0);
            const durations=last30.map(r=>Math.round(r.duration/1000));
            new Chart(document.getElementById('passRate'),{type:'line',data:{labels,datasets:[{label:'Pass %',data:passRates,borderColor:'#4CAF50',tension:0.3}]},options:{scales:{y:{min:0,max:100}}}});
            new Chart(document.getElementById('duration'),{type:'line',data:{labels,datasets:[{label:'Duration (s)',data:durations,borderColor:'#2196F3',tension:0.3}]},options:{scales:{y:{min:0}}}});
          });
          </script>
          </body></html>
          TRENDSEOF

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true

      - name: Notify Discord on failure (detailed)
        if: failure()
        env:
          # Direct Discord webhook for #peopleclaw-e2e (channel 1493222389880717513).
          # We POST with ?thread_id=1499265524851540089 to land in the #peopleclaw第四进化 thread.
          # webhook-router was bypassed because it parses payloads via source-specific parsers and
          # cannot pass arbitrary embeds through (router was returning event:unknown for raw embed posts).
          DISCORD_WEBHOOK: https://discord.com/api/webhooks/1499741777123610716/21KcSTBn4573F96MRjg-kB6wUAOQvedninqz2lMB-zCzyS47OON07S7sh9DyupPZ7yeR
          THREAD_ID: "1499265524851540089"
          DASHBOARD: https://exisz.github.io/peopleclaw
          ACTION_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -u
          RESULTS="apps/admin/test-results/results.json"

          # Build a single summary embed listing failed tests + actionable links.
          # One embed > many embeds: avoids per-test rate-limit / payload bloat and keeps router-free format simple.
          if [ -f "$RESULTS" ]; then
            FAILED_LIST=$(jq -r '
              [ .. | objects | select(has("ok") and has("title") and (.ok == false)) | .title ]
              | unique
              | .[0:15]
              | map("• " + .)
              | join("\n")
            ' "$RESULTS" 2>/dev/null || echo "")
            FAILED_COUNT=$(jq -r '[ .. | objects | select(has("ok") and (.ok == false)) ] | length' "$RESULTS" 2>/dev/null || echo "?")
          else
            FAILED_LIST=""
            FAILED_COUNT="?"
          fi

          if [ -z "$FAILED_LIST" ]; then
            FAILED_LIST="(could not parse results.json — see dashboard / action logs)"
          fi

          SHORT="$(printf '%s' "$SHA" | cut -c1-7)"
          DESCRIPTION=$(printf '**Failed tests (%s):**\n%s\n\n[📊 Dashboard](%s) · [🛠 Action run](%s)\nCommit: \`%s\`' \
            "$FAILED_COUNT" "$FAILED_LIST" "$DASHBOARD" "$ACTION_URL" "$SHORT")

          PAYLOAD=$(jq -n \
            --arg title "🚨 PeopleClaw E2E Failed" \
            --arg desc "$DESCRIPTION" \
            --arg url "$ACTION_URL" \
            --arg footer "sha=$SHORT · run #${{ github.run_number }}" \
            '{embeds:[{title:$title, description:$desc, url:$url, color:16711680, footer:{text:$footer}, timestamp:(now|todateiso8601)}]}')

          # POST direct to Discord webhook with thread_id — bypasses webhook-router.
          HTTP_CODE=$(curl -s -o /tmp/discord_resp -w "%{http_code}" -X POST \
            "${DISCORD_WEBHOOK}?thread_id=${THREAD_ID}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Discord webhook HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ] || cat /tmp/discord_resp || true
