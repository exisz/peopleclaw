name: E2E (Playwright)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one e2e run at a time, cancel in-progress on new push
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BASE_URL: https://app.peopleclaw.rollersoft.com.au
      E2E_USERNAME: demo_acceptance_test
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_USE_MINT: '1'
      E2E_SECRET: ${{ secrets.E2E_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @peopleclaw/admin exec playwright install --with-deps chromium

      - name: Wait for Vercel deploy
        run: |
          echo "Waiting for starter-app template to be available..."
          for i in $(seq 1 60); do
            if curl -s "$PLAYWRIGHT_BASE_URL/api/apps/templates" | grep -q 'starter-app'; then
              echo "✅ Deploy detected after ${i}0s"
              exit 0
            fi
            echo "  attempt $i/60 — not ready yet"
            sleep 10
          done
          echo "⚠️ Timeout waiting for deploy, running tests anyway"

      - name: Run e2e tests
        id: tests
        run: pnpm --filter @peopleclaw/admin exec playwright test

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 30

      - name: Prepare report for Pages
        if: always()
        run: |
          mkdir -p public
          cp -r apps/admin/playwright-report/* public/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK_E2E_FAIL != ''
        env:
          DISCORD_WEBHOOK_E2E_FAIL: ${{ secrets.DISCORD_WEBHOOK_E2E_FAIL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_E2E_FAIL?thread_id=1499265524851540089" \
            -H "Content-Type: application/json" \
            -d '{"content":"🚨 e2e failed on '${{ github.sha }}' — see https://exisz.github.io/peopleclaw/"}'
