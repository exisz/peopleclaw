name: E2E (Playwright)

on:
  schedule:
    - cron: '0 22 * * *'  # daily 22:00 UTC (08:00 Sydney)
  workflow_dispatch:

# Only allow one e2e run at a time, cancel in-progress on new push
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BASE_URL: https://app.peopleclaw.rollersoft.com.au
      E2E_USERNAME: demo_acceptance_test
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_USE_MINT: '1'
      E2E_SECRET: ${{ secrets.E2E_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @peopleclaw/admin exec playwright install --with-deps chromium

      - name: Wait for Vercel deploy
        run: |
          echo "Waiting for starter-app template to be available..."
          for i in $(seq 1 60); do
            if curl -s "$PLAYWRIGHT_BASE_URL/api/apps/templates" | grep -q 'starter-app'; then
              echo "✅ Deploy detected after ${i}0s"
              exit 0
            fi
            echo "  attempt $i/60 — not ready yet"
            sleep 10
          done
          echo "⚠️ Timeout waiting for deploy, running tests anyway"

      - name: Run e2e tests
        id: tests
        run: pnpm --filter @peopleclaw/admin exec playwright test

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 30

      - name: Prepare report for Pages
        if: always()
        run: |
          REPORT_DIR="apps/admin/playwright-report"
          if [ -f "$REPORT_DIR/index.html" ]; then
            echo "✅ Playwright report found"
            cp -r "$REPORT_DIR" public
          else
            echo "⚠️ No playwright report generated — creating placeholder"
            mkdir -p public
            echo '<!DOCTYPE html><html><body><h1>No Playwright report</h1><p>Tests may have been skipped or report generation failed.</p><p>Check the <a href="https://github.com/exisz/peopleclaw/actions">Actions tab</a> for details.</p></body></html>' > public/index.html
          fi
          # Verify we have something to publish
          ls public/index.html || (echo "❌ FATAL: no index.html to publish" && exit 1)

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK_E2E_FAIL != ''
        env:
          DISCORD_WEBHOOK_E2E_FAIL: ${{ secrets.DISCORD_WEBHOOK_E2E_FAIL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_E2E_FAIL?thread_id=1499265524851540089" \
            -H "Content-Type: application/json" \
            -d '{"content":"🚨 e2e failed on '${{ github.sha }}' — see https://exisz.github.io/peopleclaw/"}'
