name: Prod Health

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: prod-health
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PLAYWRIGHT_BASE_URL: https://app.peopleclaw.rollersoft.com.au
      E2E_USERNAME: demo_acceptance_test
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_USE_MINT: '1'
      E2E_SECRET: ${{ secrets.E2E_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @peopleclaw/admin exec playwright install --with-deps chromium

      - name: Run prod health check
        id: tests
        run: |
          pnpm --filter @peopleclaw/admin exec playwright test journeys/00-prod-health.spec.ts \
            --workers=1 --retries=0 --reporter=json 2>&1 | tee results.json || true
          # Check exit
          pnpm --filter @peopleclaw/admin exec playwright test journeys/00-prod-health.spec.ts \
            --workers=1 --retries=0

      - name: Notify Discord on failure
        if: failure()
        env:
          WEBHOOK_URL: https://linux.queue-musical.ts.net/webhook/hook/peopleclaw-e2e
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "thread_id": "1499265524851540089",
              "embeds": [{
                "title": "🏥 [PROD HEALTH] Login/Apps check failed",
                "description": "Prod health check failed at '"$(date -u +%H:%M)"' UTC. Login or /apps page may be down.",
                "color": 16711680,
                "footer": {"text": "'"${{ github.sha }}"'"}
              }]
            }'
